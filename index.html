<!DOCTYPE html>
<html>
<head>
    <title>Experiment 4 - Marks Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: #e9ffe9;
            border-left: 5px solid green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Marks Calculator</h2>

    <label>Enter Number of Subjects:</label>
    <input type="number" id="subjectCount" />

    <button onclick="takeMarks()">Submit</button>

    <div id="markInputs"></div>

    <div id="output" class="result"></div>
</div>

<script>
function takeMarks() {
    let n = parseInt(document.getElementById("subjectCount").value);
    let container = document.getElementById("markInputs");

    container.innerHTML = "";

    if (isNaN(n) || n <= 0) {
        alert("Please enter a valid number of subjects");
        return;
    }

    for (let i = 0; i < n; i++) {
        container.innerHTML +=
            "Subject " + (i + 1) + " Marks: <input type='number' id='m" + i + "'><br>";
    }

    container.innerHTML += "<button onclick='calculate(" + n + ")'>Calculate</button>";
}

function calculate(n) {
    let total = 0;

    for (let i = 0; i < n; i++) {
        let mark = parseFloat(document.getElementById("m" + i).value);

       if (isNaN(mark)) {
            alert("Please enter all marks correctly");
            return;
        }

        total += mark;
    }

    let average = total / n;

    let grade = "";
    let result = "";

    // Conditions for grade
    if (average >= 90) {
        grade = "A+";
    } else if (average >= 75) {
        grade = "A";
    } else if (average >= 60) {
        grade = "B";
    } else if (average >= 40) {
        grade = "C";
    } else {
        grade = "F";
    }

    // Pass/Fail condition
    if (average >= 40) {
        result = "PASS";
    } else {
        result = "FAIL";
    }

    document.getElementById("output").innerHTML =
        "<b>Total Marks:</b> " + total +
        "<br><b>Average Marks:</b> " + average.toFixed(2) +
        "<br><b>Grade:</b> " + grade +
        "<br><b>Result:</b> " + result;
}
</script>

</body>
</html>
